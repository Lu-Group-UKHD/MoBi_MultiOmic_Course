  - tiledb

  - pip:
      # Palantir from GitHub
      # - git+https://github.com/dpeerlab/Palantir

      # BiocPy packages from release.yml
      - biocframe>=0.5.0
      - summarizedexperiment>=0.5.3
      - singlecellexperiment>=0.5.3
      - multiassayexperiment>=0.5.0
      - genomicranges
      - iranges
      - biocutils
      - rds2py>=0.6.1
      - pybiocfilecache
      - mopsy
      - delayedarray
      - hdf5array
      - tiledbarray
      - scranpy
      - singler
      - scrnaseq
      - celldex
      - dolomite
      - dolomite-base>=0.4.2
      - dolomite-matrix>=0.2.1
      - dolomite-ranges>=0.1.1
      - dolomite-se>=0.3.0
      - dolomite-sce>=0.3.0
      - dolomite-mae>=0.2.0
      - cellarr
      - harmonypy
      - scanorama

      # Requested analysis packages
      - pydeseq2  
      - "decoupler @ git+https://github.com/scverse/decoupler.git@main"
      - "liana @ git+https://github.com/saezlab/liana-py.git@main"
