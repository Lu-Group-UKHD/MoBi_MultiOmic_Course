name: lecture__processing
channels:
  - conda-forge
  - bioconda
dependencies:
  - conda-forge::python=3.13
  - conda-forge::ipykernel=7.1.0
  - conda-forge::jupyterlab=4.5.1
  - conda-forge::ipywidgets
  - conda-forge::nbconvert
  - conda-forge::scanpy=1.11.5
  # - bioconda::anndata2ri=2.0
  # - bioconda::bioconductor-singlecellexperiment=1.28.0
  # - bioconda::bioconductor-limma
  # - bioconda::bioconductor-edger
  # - bioconda::bioconductor-deseq2
  - igraph=1.0.1
  - pip=25.3
  - python-igraph=1.0.0
  # - conda-forge::r-base=4.4.3
  # - r-sessioninfo=1.2.3
  # - r-seurat=5.4.0
  # - r-spatstat=3.5_0
  # - conda-forge::r-readr
  # - rpy2=3.6.4
  - scikit-learn=1.8.0
  - scikit-misc=0.5.2
  - scvi-tools=1.4.1
  - session-info=1.0.0
  # - scirpy
  - cmake

  - anndata >=0.11
  - mudata
  - muon
  # Common deps useful for Palantir / MAGIC-style workflows
  - networkx
  - tqdm
  - natsort

  # PyDESeq2 and formula handling
  - formulaic
  - formulaic-contrasts

  # BiocPy release environment pieces
  - cmake
  - openssl
  - hdf5
  - pyarrow
  - pybind11
  - rich
  - python-dateutil
